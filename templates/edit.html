{% extends 'starter-page.html' %}
{% load static %}

{% block content %}

<!-- Appointment Section -->
<section id="appointment" class="appointment section">

  <!-- Section Title -->
  <div class="container section-title" data-aos="fade-up">
    <h2>Edit Appointment</h2>
    <p>Necessitatibus eius consequatur ex aliquid fuga eum quidem sint consectetur velit</p>
  </div>

  <div class="container" data-aos="fade-up" data-aos-delay="100">

    <form method="post">
      {% csrf_token %}

      <div class="row">
        <div class="col-md-4 form-group">
          <input type="text" value="{{ appointment.name }}" name="name" class="form-control" placeholder="Your Name" required>
        </div>

        <div class="col-md-4 form-group mt-3 mt-md-0">
          <input type="email" value="{{ appointment.email }}" name="email" class="form-control" placeholder="Your Email" required>
        </div>

        <div class="col-md-4 form-group mt-3 mt-md-0">
          <input type="tel" value="{{ appointment.phone }}" name="phone" class="form-control" placeholder="Your Phone" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 form-group mt-3">
          <input type="datetime-local" name="date" class="form-control" required>
        </div>

        <div class="col-md-4 form-group mt-3">
          <select name="department" class="form-select" required>
            <option value="">Select Department</option>
            <option value="Department 1">Ophthalmology</option>
                <option value="Department 2">Physical Therapy</option>
                <option value="Department 3">Cardiology</option>
                <option value="Department 4">Orthopedics</option>
                <option value="Department 5">Pulmonology</option>
          </select>
        </div>

        <div class="col-md-4 form-group mt-3">
          <select name="doctor" class="form-select" required>
            <option value="">Select Doctor</option>
             <option value="Doctor 1">Dr. Tsunade</option>
                <option value="Doctor 2">Dr. Tim Marcoh</option>
                <option value="Doctor 3">Dr. Recovery Girl</option>
                <option value="Doctor 4">Dr. Orochimaru</option>
                <option value="Doctor 5">Dr. Tamayo</option>
          </select>
        </div>
      </div>

      <div class="form-group mt-3">
        <textarea name="message" value="{{ appointment.message }}" class="form-control" rows="5" placeholder="Message (Optional)"></textarea>
      </div>

      <div class="mt-3 text-center">
        <button type="submit">Update Appointment</button>
      </div>

    </form>

  </div>
</section>

{% endblock %}
